<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>高速マスター デモ</title>
<style>
:root{--pri:#1a5276;--pri-l:#2980b9;--acc:#e67e22;--ok:#27ae60;--ng:#c0392b;--bg:#f4f6f8;--card:#fff;--txt:#2c3e50;--txt2:#7f8c8d;--sh:0 2px 12px rgba(0,0,0,.08);--gap:8px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:center}
header .wrap{flex:1;text-align:center}
header h1{font-size:15px;font-weight:700;letter-spacing:.5px}
header .sub{font-size:11px;opacity:.8;margin-top:2px}
.prog-bar{height:4px;background:rgba(255,255,255,.2)}.prog-fill{height:100%;background:var(--acc);transition:width .4s}
.back-btn{position:absolute;left:12px;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px}
main{flex:1;display:flex;flex-direction:column;max-width:600px;width:100%;margin:0 auto;padding:16px}
.screen{display:none;flex-direction:column;flex:1}.screen.active{display:flex}
.menu-title{font-size:18px;font-weight:800;color:var(--pri);text-align:center;margin:8px 0 4px}
.menu-sub{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:12px}
.sec{background:var(--card);border-radius:14px;padding:16px;box-shadow:var(--sh);margin-bottom:12px}
.sec h3{font-size:13px;font-weight:700;color:var(--pri);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap)}
.cat-btn{padding:14px 10px;border:2px solid #e0e5ec;border-radius:10px;background:var(--card);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.cat-btn:active{transform:scale(.96)}
.cat-btn .cnt{font-size:11px;color:var(--txt2);font-weight:400;margin-top:2px}
.cat-btn .mastery{font-size:10px;margin-top:3px;font-weight:700}
.mode-btn{display:flex;align-items:center;gap:12px;padding:16px;border:2px solid #e0e5ec;border-radius:12px;background:var(--card);font-size:14px;font-weight:600;cursor:pointer;width:100%;text-align:left;transition:all .15s;margin-bottom:var(--gap)}
.mode-btn:active{transform:scale(.97)}
.mode-btn .icon{font-size:22px;flex-shrink:0}
.mode-btn .desc{font-size:11px;color:var(--txt2);font-weight:400;margin-top:2px}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.range-row label{font-size:13px;font-weight:600;white-space:nowrap}
.range-input{padding:8px 10px;border:2px solid #e0e5ec;border-radius:8px;font-size:14px;text-align:center;width:64px}
.range-go{padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--acc),#d35400);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:13px;color:var(--txt2)}
.quiz-top .qn{font-weight:700;color:var(--pri);font-size:14px}
.quiz-top .sc{font-weight:600}
.q-card{background:var(--card);border-radius:14px;padding:20px 18px;box-shadow:var(--sh);margin-bottom:16px}
.q-card .cat-label{font-size:10px;color:var(--pri-l);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.q-card .q-text{font-size:16px;font-weight:700;line-height:1.6}
.choices{display:flex;flex-direction:column;gap:var(--gap)}
.ch-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid #e0e5ec;border-radius:12px;padding:16px;font-size:14px;line-height:1.5;cursor:pointer;text-align:left;width:100%;transition:all .15s}
.ch-btn:active{transform:scale(.98)}
.ch-btn .num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--pri)}
.ch-btn.correct{border-color:var(--ok);background:#eafaf1}.ch-btn.correct .num{background:var(--ok);color:#fff}
.ch-btn.wrong{border-color:var(--ng);background:#fdedec}.ch-btn.wrong .num{background:var(--ng);color:#fff}
.ch-btn.dim{pointer-events:none;opacity:.55}.ch-btn.correct.dim,.ch-btn.wrong.dim{opacity:1}
.fb{text-align:center;padding:14px;font-size:14px;font-weight:700;border-radius:10px;margin-top:12px;display:none}
.fb.show{display:block}.fb.ok{background:#eafaf1;color:var(--ok)}.fb.ng{background:#fdedec;color:var(--ng)}
.nxt{margin-top:14px;text-align:center;display:none}.nxt.show{display:block}
.nxt .btn{padding:18px 48px;font-size:17px;border-radius:14px}
.btn{display:inline-block;padding:14px 36px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,var(--acc),#d35400);color:#fff;box-shadow:0 4px 14px rgba(230,126,34,.25)}
.btn-s{background:var(--bg);color:var(--pri);border:2px solid #e0e5ec}
#result{justify-content:center;align-items:center;text-align:center;gap:16px;padding-top:40px}
.res-circle{width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;border:6px solid}
.res-circle .big{font-size:44px}.res-circle .unt{font-size:13px;margin-top:-2px}
.res-circle.s1{border-color:var(--ok);color:var(--ok);background:#eafaf1}
.res-circle.s2{border-color:var(--pri-l);color:var(--pri-l);background:#eaf2f8}
.res-circle.s3{border-color:var(--acc);color:var(--acc);background:#fef5e7}
.res-msg{font-size:17px;font-weight:700}
.res-det{font-size:13px;color:var(--txt2);line-height:1.6}
.res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.stats-bar{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);padding:4px 0;border-bottom:1px solid #eee;margin-bottom:4px}
.stats-bar .val{font-weight:700;color:var(--pri)}
.reset-btn{font-size:11px;color:var(--ng);background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:8px}
.fmt-table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.fmt-table th,.fmt-table td{border:1px solid #e0e5ec;padding:5px 6px;text-align:left}
.fmt-table th{background:var(--bg);font-weight:700;color:var(--pri);white-space:nowrap}
.fmt-note{font-size:11px;color:var(--txt2);line-height:1.6;margin:6px 0}
.fmt-note b{color:var(--txt)}
.dl-tpl{display:inline-block;margin-top:6px;padding:8px 16px;border:none;border-radius:8px;background:var(--pri-l);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.file-pick-wrap{margin-top:10px}
.file-pick-label{display:inline-block;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,var(--acc),#d35400);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.file-pick-wrap input[type=file]{display:none}
.miss-log{margin-top:8px;max-height:400px;overflow-y:auto}
.miss-item{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:8px;font-size:12px;line-height:1.6;border-left:4px solid var(--ng)}
.miss-item .miss-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.miss-item .miss-id{font-weight:700;color:var(--pri)}
.miss-item .miss-ts{font-size:10px;color:var(--txt2)}
.miss-item .miss-q{font-weight:600;margin-bottom:4px}
.miss-item .miss-picked{color:var(--ng);font-weight:700}
.miss-item .miss-correct{color:var(--ok);font-weight:700}
.miss-item .miss-memo{margin-top:6px}
.miss-item textarea{width:100%;border:1px solid #e0e5ec;border-radius:6px;padding:6px 8px;font-size:11px;resize:vertical;min-height:32px;font-family:inherit}
.miss-empty{font-size:13px;color:var(--txt2);text-align:center;padding:20px 0}
.miss-export{display:inline-block;margin-top:6px;padding:8px 16px;border:none;border-radius:8px;background:var(--ok);color:#fff;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px}
.miss-count{display:inline-block;background:var(--ng);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;margin-left:4px}
.miss-filter select{padding:6px 8px;border:2px solid #e0e5ec;border-radius:8px;font-size:12px;background:var(--card)}
.ml-item{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:var(--sh);font-size:13px;line-height:1.6}
.ml-item .ml-head{display:flex;justify-content:space-between;margin-bottom:4px}
.ml-item .ml-id{font-weight:700;color:var(--pri);font-size:12px}
.ml-item .ml-cat{font-size:11px;color:var(--pri-l);font-weight:600}
.ml-item .ml-q{font-weight:600;margin-bottom:6px}
.ml-item .ml-ans{font-size:12px}
.ml-item .ml-wrong-list{margin-top:4px;font-size:11px;color:var(--txt2)}
.ml-item .ml-wrong-list .ml-was-picked{color:var(--ng);font-weight:700}
.ml-summary{font-size:13px;color:var(--txt2);margin-bottom:12px;text-align:center}
.tab-bar{display:flex;gap:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:10px;border:2px solid #e0e5ec;border-radius:10px;background:var(--card);font-size:12px;font-weight:700;cursor:pointer;text-align:center;color:var(--txt2)}
.tab-btn.active{border-color:var(--pri-l);background:#eaf2f8;color:var(--pri)}
.sync-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#4285f4,#1a73e8);color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
.sync-btn:disabled{opacity:.5}
.sync-status{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:8px;display:none}
.sync-status.ok{display:block;background:#eafaf1;color:var(--ok)}
.sync-status.ng{display:block;background:#fdedec;color:var(--ng)}
.sync-status.loading{display:block;background:#eaf2f8;color:var(--pri-l)}
.unsent-badge{display:inline-block;background:var(--acc);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;margin-left:4px}

/* Login */
#login{justify-content:center;align-items:center;text-align:center;gap:20px;padding:40px 20px}
#login .logo{font-size:56px}
#login h2{font-size:20px;color:var(--pri)}
#login .login-input{padding:14px 18px;border:2px solid #e0e5ec;border-radius:12px;font-size:16px;width:100%;max-width:280px;text-align:center}
#login .login-input:focus{outline:none;border-color:var(--pri-l)}
.login-btns{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%;max-width:280px}
.guest-link{font-size:13px;color:var(--txt2);cursor:pointer;text-decoration:underline;margin-top:4px}

/* iPad/tablet: bigger gaps */
@media(min-width:700px){
  :root{--gap:14px}
  .ch-btn{padding:20px 20px;font-size:16px;border-radius:14px}
  .ch-btn .num{width:34px;height:34px;font-size:14px}
  .mode-btn{padding:18px;font-size:15px}
  .cat-btn{padding:16px 12px;font-size:14px}
  .q-card .q-text{font-size:18px}
  .q-card{padding:24px 22px}
  main{padding:24px}
  .btn{padding:16px 44px;font-size:16px}
  .nxt .btn{padding:22px 56px;font-size:18px}
}
@media(min-width:1024px){
  :root{--gap:16px}
  .ch-btn{padding:22px 24px;font-size:17px}
  main{max-width:700px}
}
</style>
</head>
<body>
<header>
  <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">←</button>
  <div class="wrap">
    <h1 id="headerTitle">高速マスター デモ</h1>
    <div class="sub" id="headerSub"></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
</header>
<main>

<!-- LOGIN -->
<div class="screen active" id="login">
  <div class="logo">⚡</div>
  <h2>高速マスター 基礎用語300</h2>
  <input class="login-input" id="nameInput" type="text" placeholder="名前を入力" maxlength="20">
  <div class="login-btns">
    <button class="btn btn-p" onclick="loginWithName()" style="width:100%">はじめる</button>
    <span class="guest-link" onclick="loginAsGuest()">ゲストで始める</span>
  </div>
</div>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="menu-title">⚡ 演習モード選択</div>
  <div class="menu-sub" id="menuSub"></div>
  <div class="sec">
    <h3>🎲 全体から出題</h3>
    <div class="mode-btn" onclick="startSmart(20)"><span class="icon">🧠</span><div><div>苦手優先20問</div><div class="desc">間違えた問題・未出題を優先</div></div></div>
    <div class="mode-btn" onclick="startRandom(20)"><span class="icon">🔀</span><div><div>ランダム20問</div></div></div>
    <div class="mode-btn" onclick="startRandom(50)"><span class="icon">🔀</span><div><div>ランダム50問</div></div></div>
  </div>
  <div class="sec"><h3>📂 カテゴリ別</h3><div class="cat-grid" id="catGrid"></div></div>
  <div class="sec">
    <h3>📍 範囲指定</h3>
    <div class="range-row">
      <label>第</label><input type="number" class="range-input" id="rangeFrom" value="1" min="1">
      <label>問〜第</label><input type="number" class="range-input" id="rangeTo" value="30" min="1">
      <label>問</label>
      <button class="range-go" onclick="startRange()">スタート</button>
    </div>
  </div>
  <div class="sec">
    <h3>⭐ おすすめ</h3>
    <div class="mode-btn" onclick="startRecommended()"><span class="icon">💡</span><div><div>厳選30問</div><div class="desc">各カテゴリから3問ずつ</div></div></div>
    <div class="mode-btn" onclick="startWeakest(20)"><span class="icon">🔥</span><div><div>苦手克服20問</div></div></div>
    <div class="mode-btn" onclick="startMissedOnly()"><span class="icon">❌</span><div><div>過去に間違えた問題だけ</div></div></div>
  </div>
  <div class="sec">
    <h3>📝 誤答ログ<span class="miss-count" id="missCount" style="display:none"></span></h3>
    <div class="tab-bar">
      <button class="tab-btn active" id="tabLog" onclick="switchTab('log')">誤答履歴</button>
      <button class="tab-btn" id="tabList" onclick="switchTab('list')">間違えた問題一覧</button>
    </div>
    <div id="tabLogContent"><div class="miss-filter"><select id="missFilterCat" onchange="renderMissLog()"><option value="">全カテゴリ</option></select></div><div class="miss-log" id="missLog"></div></div>
    <div id="tabListContent" style="display:none"><div class="miss-log" id="missedList"></div></div>
    <div style="margin-top:10px">
      <button class="sync-btn" id="syncBtn" onclick="syncToSheet()">📤 スプレッドシートに送信 <span class="unsent-badge" id="unsentBadge" style="display:none"></span></button>
      <div class="sync-status" id="syncStatus"></div>
    </div>
    <div style="margin-top:8px">
      <button class="miss-export" onclick="exportMissLog()">📥 誤答ログExcel</button>
      <button class="miss-export" style="background:var(--pri-l)" onclick="exportMissedList()">📥 問題一覧Excel</button>
      <button class="reset-btn" onclick="clearMissLog()">誤答ログをクリア</button>
    </div>
  </div>
  <div class="sec"><h3>📊 学習状況</h3><div id="statsArea"></div><button class="reset-btn" onclick="resetStats()">学習記録をリセット</button></div>
  <div class="sec">
    <h3>📥 別科目の問題を読み込む</h3>
    <p class="fmt-note"><b>1行目をヘッダー</b>にしたExcel(.xlsx)を用意してください。</p>
    <table class="fmt-table"><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th><th>G</th></tr><tr><td>カテゴリ</td><td>問題</td><td>正解</td><td>誤答1</td><td>誤答2</td><td>誤答3</td><td>誤答4</td></tr></table>
    <button class="dl-tpl" onclick="downloadTemplate()">📄 テンプレート</button>
    <div class="file-pick-wrap"><label class="file-pick-label">ファイルを選択して読み込む<input type="file" accept=".xlsx,.csv,.json" onchange="importFile(event)"></label></div>
  </div>
  <div style="text-align:center;margin:8px 0"><span class="guest-link" onclick="logout()">ユーザー切替 / ログアウト</span></div>
</div>

<div class="screen" id="quiz">
  <div class="quiz-top"><span class="qn" id="qn"></span><span class="sc" id="sc"></span></div>
  <div class="q-card"><div class="cat-label" id="catL"></div><div class="q-text" id="qTxt"></div></div>
  <div class="choices" id="choices"></div>
  <div class="fb" id="fb"></div>
  <div class="nxt" id="nxt"><button class="btn btn-p" onclick="next()">次の問題 →</button></div>
</div>

<div class="screen" id="result">
  <div class="res-circle" id="resC"><span class="big" id="resS"></span><span class="unt" id="resU"></span></div>
  <div class="res-msg" id="resM"></div>
  <div class="res-det" id="resD"></div>
  <div class="res-btns">
    <button class="btn btn-s" onclick="goMenu()">メニューに戻る</button>
    <button class="btn btn-p" onclick="retry()">もう一度</button>
  </div>
</div>

</main>

<script>

// ============ STATS ============
function getStats(){try{return JSON.parse(localStorage.getItem('km_'+subjectKey))||{}}catch(e){return{}}}

function getRecord(id){const s=getStats();return s[id]||{w:0,total:0,correct:0,lastOk:0}}
function recordAnswer(id,isOk){const s=getStats();const r=s[id]||{w:0,total:0,correct:0,lastOk:0};r.total++;if(isOk){r.correct++;r.w+=2;r.lastOk=Date.now()}else{r.w-=5}s[id]=r;saveStats(s)}

// ============ SYNC ============
function getUnsentCount(){return getMissLog().filter(m=>!m.synced).length}
function updateUnsentBadge(){const n=getUnsentCount();const b=document.getElementById('unsentBadge');if(n>0){b.textContent='未送信'+n+'件';b.style.display='inline'}else{b.style.display='none'}}

async function syncToSheet(){
  const log=getMissLog();
  const unsent=log.filter(m=>!m.synced);
  if(!unsent.length){setSyncStatus('ok','送信済みの新しい誤答はありません');return}
  const btn=document.getElementById('syncBtn');btn.disabled=true;
  setSyncStatus('loading','送信中… ('+unsent.length+'件)');
  try{
    // Use script tag injection (JSONP-like, most reliable cross-origin)
    const chunkSize=3;
    for(let i=0;i<unsent.length;i+=chunkSize){
      const chunk=unsent.slice(i,i+chunkSize);
      const url=GAS_URL+'?data='+encodeURIComponent(JSON.stringify(chunk));
      await new Promise((resolve)=>{
        const script=document.createElement('script');
        script.src=url;
        script.onload=()=>{document.head.removeChild(script);resolve()};
        script.onerror=()=>{document.head.removeChild(script);resolve()};
        setTimeout(()=>{resolve()},8000);
        document.head.appendChild(script);
      });
    }
    log.forEach(m=>{m.synced=true});saveMissLog(log);
    setSyncStatus('ok','✅ '+unsent.length+'件を送信しました');
    updateUnsentBadge();
  }catch(e){setSyncStatus('ng','❌ 送信失敗: '+e.message)}
  finally{btn.disabled=false}
}
function setSyncStatus(t,m){const e=document.getElementById('syncStatus');e.className='sync-status '+t;e.textContent=m}

// ============ RENDER ============
function renderMissLog(){
  const log=getMissLog();const fc=document.getElementById('missFilterCat').value;
  const filtered=fc?log.filter(m=>m.cat===fc):log;
  const ce=document.getElementById('missCount');
  if(log.length>0){ce.textContent=log.length;ce.style.display='inline'}else{ce.style.display='none'}
  const c=document.getElementById('missLog');
  if(!filtered.length){c.innerHTML='<div class="miss-empty">誤答記録はまだありません</div>';return}
  c.innerHTML=filtered.slice().reverse().slice(0,50).map(m=>{
    const oi=log.indexOf(m);const d=new Date(m.ts);
    const ts=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    const sm=m.synced?'<span style="color:var(--ok);font-size:10px">✓済</span>':'<span style="color:var(--acc);font-size:10px">未送信</span>';
    return '<div class="miss-item"><div class="miss-head"><span class="miss-id">#'+m.id+' '+escH(m.cat)+'</span><span class="miss-ts">'+ts+' '+sm+'</span></div>'+
      '<div class="miss-q">'+escH(m.q)+'</div>'+
      '<div>選んだ答: <span class="miss-picked">'+escH(m.picked)+'</span></div>'+
      '<div>正解: <span class="miss-correct">'+escH(m.correct)+'</span></div>'+
      '<div class="miss-memo"><textarea placeholder="メモ" oninput="updateMissMemo('+oi+',this.value)">'+escH(m.memo||'')+'</textarea></div></div>';
  }).join('');
  updateUnsentBadge();
}
function renderMissedList(){
  const log=getMissLog();const ids=getMissedIds();const c=document.getElementById('missedList');
  if(!ids.length){c.innerHTML='<div class="miss-empty">まだ間違えた問題はありません</div>';return}
  const items=ids.map(id=>{const q=ALL.find(q=>q.id===id);if(!q)return null;const e=log.filter(m=>m.id===id);const r=getRecord(id);return{q,e,ps:[...new Set(e.map(x=>x.picked))],mc:e.length,rate:r.total>0?Math.round(r.correct/r.total*100):0}}).filter(Boolean);
  items.sort((a,b)=>b.mc-a.mc);
  c.innerHTML='<div class="ml-summary">間違えた問題: <b>'+items.length+'問</b></div>'+items.map(it=>
    '<div class="ml-item"><div class="ml-head"><span class="ml-id">#'+it.q.id+'</span><span class="ml-cat">'+escH(it.q.cat)+'</span></div>'+
    '<div class="ml-q">'+escH(it.q.q)+'</div><div class="ml-ans">正解: <b style="color:var(--ok)">'+escH(it.q.correct)+'</b>　正答率:'+it.rate+'%　誤答:'+it.mc+'回</div>'+
    '<div class="ml-wrong-list">選んだ誤答: '+it.ps.map(p=>'<span class="ml-was-picked">'+escH(p)+'</span>').join('、')+'</div></div>'
  ).join('');
}

  document.getElementById('headerTitle').textContent=title||'高速マスター デモ';
  document.getElementById('headerSub').textContent=ALL.length+'問'+(currentUser!=='guest'?' ('+currentUser+')':'');
  document.getElementById('menuSub').textContent=ALL.length+'問から選んで演習しよう';
  document.getElementById('rangeTo').max=ALL.length;document.getElementById('rangeFrom').max=ALL.length;
  document.getElementById('rangeTo').value=Math.min(30,ALL.length);
  const sel=document.getElementById('missFilterCat');sel.innerHTML='<option value="">全カテゴリ</option>';
  CATS.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
  buildCatGrid();updateStats();renderMissLog();renderMissedList();updateUnsentBadge();
}
function buildCatGrid(){const g=document.getElementById('catGrid');g.innerHTML='';CATS.forEach(c=>{const qs=ALL.filter(q=>q.cat===c);const st=getStats();const ma=qs.filter(q=>st[q.id]&&st[q.id].w>=4).length;const b=document.createElement('button');b.className='cat-btn';b.innerHTML=c+'<div class="cnt">'+qs.length+'問</div><div class="mastery" style="color:'+(ma===qs.length?'var(--ok)':ma>0?'var(--pri-l)':'var(--txt2)')+'">修得 '+ma+'/'+qs.length+'</div>';b.onclick=()=>startCategory(c);g.appendChild(b)})}
function updateStats(){const st=getStats();const t=ALL.length;const at=ALL.filter(q=>st[q.id]&&st[q.id].total>0).length;const ma=ALL.filter(q=>st[q.id]&&st[q.id].w>=4).length;const ta=Object.values(st).reduce((s,r)=>s+r.total,0);const to=Object.values(st).reduce((s,r)=>s+r.correct,0);const rt=ta>0?Math.round(to/ta*100):0;document.getElementById('statsArea').innerHTML='<div class="stats-bar"><span>演習済み</span><span class="val">'+at+'/'+t+'</span></div><div class="stats-bar"><span>修得済み</span><span class="val">'+ma+'/'+t+'</span></div><div class="stats-bar"><span>通算正解率</span><span class="val">'+rt+'%（'+to+'/'+ta+'）</span></div>'}
function resetStats(){if(!confirm('学習記録をリセットしますか？'))return;localStorage.removeItem('km_'+subjectKey);buildCatGrid();updateStats()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function selectByWeight(pool,n){const sc=pool.map(q=>({q,w:getWeight(q.id)}));sc.sort((a,b)=>a.w-b.w);return shuffle(sc.slice(0,n).map(s=>s.q))}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');currentScreen=id;document.getElementById('backBtn').style.display=(id==='menu'||id==='login')?'none':'block'}
function goBack(){if(currentScreen==='quiz'){if(confirm('演習を中断しますか？'))goMenu()}else goMenu()}
function goMenu(){show('menu');document.getElementById('prog').style.width='0%';buildCatGrid();updateStats();renderMissLog();renderMissedList();updateUnsentBadge()}

function startCategory(c){lastMode='cat';lastArg=c;const p=ALL.filter(q=>q.cat===c);deck=selectByWeight(p,p.length);cur=0;ok=0;show('quiz');load()}
function startRandom(n){lastMode='rand';lastArg=n;deck=shuffle(ALL.slice()).slice(0,n);cur=0;ok=0;show('quiz');load()}
function startSmart(n){lastMode='smart';lastArg=n;deck=selectByWeight(ALL,n);cur=0;ok=0;show('quiz');load()}
function startWeakest(n){lastMode='weak';lastArg=n;const st=getStats();const att=ALL.filter(q=>st[q.id]&&st[q.id].total>0);if(!att.length){alert('まだ演習記録がありません');return}deck=selectByWeight(att,n);cur=0;ok=0;show('quiz');load()}
function startRange(){const f=parseInt(document.getElementById('rangeFrom').value),t=parseInt(document.getElementById('rangeTo').value);if(isNaN(f)||isNaN(t)||f<1||t>ALL.length||f>t)return alert('正しい範囲を入力してください');lastMode='range';lastArg=[f,t];deck=ALL.filter(q=>q.id>=f&&q.id<=t);cur=0;ok=0;show('quiz');load()}
function startRecommended(){lastMode='rec';lastArg=null;let p=[];CATS.forEach(c=>{p.push(...selectByWeight(ALL.filter(q=>q.cat===c),3))});deck=shuffle(p);cur=0;ok=0;show('quiz');load()}
function startMissedOnly(){const ids=getMissedIds();if(!ids.length){alert('まだ間違えた問題がありません');return}lastMode='missed';lastArg=null;deck=shuffle(ALL.filter(q=>ids.includes(q.id)));cur=0;ok=0;show('quiz');load()}

function load(){
  answered=false;const q=deck[cur];
  document.getElementById('prog').style.width=(cur/deck.length*100)+'%';
  document.getElementById('qn').textContent=(cur+1)+' / '+deck.length;
  document.getElementById('sc').textContent='正解 '+ok;
  document.getElementById('catL').textContent=q.cat+'　#'+q.id;
  document.getElementById('qTxt').textContent=q.q;
  document.getElementById('fb').className='fb';
  document.getElementById('nxt').className='nxt';
  const wrongs=shuffle(q.wrong.slice()).slice(0,4);
  const opts=shuffle([{t:q.correct,ok:true},...wrongs.map(w=>({t:w,ok:false}))]);
  const box=document.getElementById('choices');box.innerHTML='';
  const labels=['①','②','③','④','⑤'];
  opts.forEach((o,i)=>{const b=document.createElement('button');b.className='ch-btn';b.innerHTML='<span class="num">'+labels[i]+'</span><span>'+o.t+'</span>';b.onclick=()=>pick(b,o.ok,o.t,box);box.appendChild(b)});
  // ⑥ 分からない
  const dk=document.createElement('button');dk.className='ch-btn';dk.style.borderStyle='dashed';dk.style.color='var(--txt2)';dk.innerHTML='<span class="num" style="background:var(--txt2);color:#fff">⑥</span><span>分からない</span>';dk.onclick=()=>pick(dk,false,'分からない',box);box.appendChild(dk);
}
function pick(btn,isOk,pickedText,box){
  if(answered)return;answered=true;const q=deck[cur];
  recordAnswer(q.id,isOk);if(!isOk)addMiss(q,pickedText);
  const fb=document.getElementById('fb');
  box.querySelectorAll('.ch-btn').forEach(b=>{b.classList.add('dim')});
  if(isOk){ok++;btn.classList.remove('dim');btn.classList.add('correct');fb.textContent='⭕ 正解！';fb.className='fb show ok'}
  else{btn.classList.remove('dim');btn.classList.add('wrong');box.querySelectorAll('.ch-btn').forEach(b=>{if(!b.classList.contains('wrong')){const t=b.querySelector('span:last-child').textContent;if(t===q.correct){b.classList.remove('dim');b.classList.add('correct')}}});fb.textContent='❌ 不正解　正解：'+q.correct;fb.className='fb show ng'}
  document.getElementById('sc').textContent='正解 '+ok;document.getElementById('nxt').className='nxt show';
}
function next(){cur++;if(cur>=deck.length)showResult();else load()}
function showResult(){
  document.getElementById('prog').style.width='100%';show('result');
  const pct=Math.round(ok/deck.length*100);document.getElementById('resS').textContent=pct;document.getElementById('resU').textContent='% ('+ok+'/'+deck.length+')';
  const c=document.getElementById('resC');c.className='res-circle '+(pct>=80?'s1':pct>=50?'s2':'s3');
  document.getElementById('resM').textContent=pct===100?'完全修得！':pct>=80?'あと少し！':pct>=50?'もう少し！':'要復習';
  document.getElementById('resD').textContent=pct===100?'すべて正解！':'間違えた用語を復習しましょう。';
  buildCatGrid();updateStats();renderMissLog();renderMissedList();updateUnsentBadge();
}
function retry(){if(lastMode==='cat')startCategory(lastArg);else if(lastMode==='rand')startRandom(lastArg);else if(lastMode==='smart')startSmart(lastArg);else if(lastMode==='weak')startWeakest(lastArg);else if(lastMode==='range'){document.getElementById('rangeFrom').value=lastArg[0];document.getElementById('rangeTo').value=lastArg[1];startRange()}else if(lastMode==='rec')startRecommended();else if(lastMode==='missed')startMissedOnly()}
function downloadTemplate(){const wb=XLSX.utils.book_new();const data=[['カテゴリ','問題','正解','誤答選択肢1','誤答選択肢2','誤答選択肢3','誤答選択肢4'],['地形','三角州が形成されやすいのは（　　）である。','河口付近','山頂付近','河川の上流','海溝付近','扇状地の末端']];const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:12},{wch:40},{wch:16},{wch:16},{wch:16},{wch:16},{wch:16}];XLSX.utils.book_append_sheet(wb,ws,'問題');XLSX.writeFile(wb,'kosoku_template.xlsx')}
function importFile(ev){const file=ev.target.files[0];if(!file)return;const ext=file.name.split('.').pop().toLowerCase();if(ext==='json'){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);const t=prompt('科目名',file.name.replace(/\.[^.]+$/,''));initSubject(d,'imp_'+t,'高速マスター '+t);goMenu()}catch(e){alert('JSON読込エラー')}};r.readAsText(file);return}const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});let hIdx=0;for(let i=0;i<Math.min(5,rows.length);i++){if(rows[i]&&rows[i].some(c=>typeof c==='string'&&(c.includes('問題')||c.includes('正解')||c.includes('カテゴリ')))){hIdx=i;break}}const hd=rows[hIdx].map(h=>String(h||'').trim());const ci={cat:-1,q:-1,cor:-1,w:[]};hd.forEach((h,i)=>{if(h.match(/カテゴリ|分野|単元|章/)&&ci.cat<0)ci.cat=i;else if(h.match(/問題|設問|質問/)&&ci.q<0)ci.q=i;else if(h.match(/正解|答え|正答/)&&ci.cor<0)ci.cor=i;else if(h.match(/誤答|不正解|ダミー|選択肢/))ci.w.push(i)});if(ci.q<0||ci.cor<0){alert('「問題」「正解」列が見つかりません');return}if(ci.w.length<3){for(let i=ci.cor+1;i<hd.length&&ci.w.length<4;i++)ci.w.push(i)}const data=[];for(let i=hIdx+1;i<rows.length;i++){const r=rows[i];if(!r||!r[ci.q])continue;data.push({id:data.length+1,cat:ci.cat>=0?String(r[ci.cat]||'未分類'):'未分類',q:String(r[ci.q]),correct:String(r[ci.cor]),wrong:ci.w.map(j=>String(r[j]||'')).filter(s=>s)})}if(!data.length){alert('問題が読み取れませんでした');return}const t=prompt('科目名',file.name.replace(/\.[^.]+$/,''));if(!t)return;initSubject(data,'imp_'+t,'高速マスター '+t);goMenu();alert(data.length+'問を読み込みました！')}catch(e){alert('読込エラー: '+e.message)}};r.readAsArrayBuffer(file)}

// Auto-login if name saved
const savedName=localStorage.getItem('km_user');
if(savedName){currentUser=savedName;document.getElementById('nameInput').value=savedName;startApp()}
</script>
